services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/localdb
    env_file:
      - ./backend/.env
    environment:
      - ENV=development

  web:
    build:
      context: ./web
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  backend-data:
